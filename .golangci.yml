version: 2

run:
  timeout: 5m
  go: "1.22"
  # Lint integration-tagged files too, so `make lint` matches what CI builds.
  build-tags:
    - integration

linters:
  enable:
    - revive
    - govet
    - staticcheck
    - gosec
    - errcheck
    - exhaustive
    - unused

issues:
  # Show all issues, not just the first few per linter.
  max-issues-per-linter: 0
  max-same-issues: 0
