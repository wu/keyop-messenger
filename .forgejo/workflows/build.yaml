name: Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Container-based arches: amd64 (Docker on x86_64 host) and arm64 (Docker on
  # an aarch64 host). Both run the same steps inside the official golang image.
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Build & Test ${{ matrix.arch }}
    strategy:
      # Don't cancel other arches when one fails — each is independent.
      fail-fast: false
      matrix:
        include:
          # race_flag: enable Go's race detector where TSan's VMA assumptions
          # are satisfied. Some arm64 Linux kernels error with
          # "FATAL: ThreadSanitizer: unsupported VMA range" — drop -race there.
          - { arch: amd64, runner: docker,       race_flag: "-race" }
          - { arch: arm64, runner: linux-arm64,  race_flag: "" }
    runs-on: ${{ matrix.runner }}
    container:
      image: golang:1.26
      # --init: tini as PID 1 reaps zombies so child processes are cleaned up.
      # --tmpfs /tmp:exec,size=2g: RAM-backed /tmp for fast fsync (messenger has
      # throughput tests that fsync on every message). exec is required because
      # Docker's --tmpfs defaults to noexec, which blocks Go from running
      # compiled test binaries under /tmp/go-build*.
      options: "--init --tmpfs /tmp:exec,size=2g"
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs

      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ matrix.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        # -tags integration runs unit tests *and* integration tests in a single
        # invocation (build tags are inclusive — untagged tests always compile).
        # -v streams per-test progress so the runner UI doesn't appear stalled
        # while the large root package runs. 5m timeout: the suite completes well
        # under that now; a hang trips the timeout (with a goroutine dump) instead.
        run: go test ${{ matrix.race_flag }} -v -tags integration -timeout 5m ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # armv6 runs on the bare Linux host (no `container:` block) because Docker
  # images for armv6 are unreliable. Toolchain (Go, nodejs, git) must be
  # preinstalled. Runner label must map to `linux-armv6:host` in config.yml.
  # ─────────────────────────────────────────────────────────────────────────────
  ci-armv6:
    name: Build & Test arm6
    runs-on: linux-armv6
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-arm6-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-arm6-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        # -tags integration runs unit tests *and* integration tests in a single
        # invocation. No -race: TSan doesn't support 32-bit ARM at all.
        run: go test -v -tags integration -timeout 5m ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # darwin/arm64 runs on the bare macOS host. Toolchain preinstalled.
  # Runner label must map to `darwin-arm64:host` in config.yml.
  # ─────────────────────────────────────────────────────────────────────────────
  ci-darwin-arm64:
    name: Build & Test darwin-arm64
    runs-on: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-darwin-arm64-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-darwin-arm64-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        # -tags integration runs unit tests *and* integration tests in a single
        # invocation. darwin/arm64 has solid TSan support in Go.
        run: go test -race -v -tags integration -timeout 5m ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Lint runs once, on amd64 only — golangci-lint's findings are
  # architecture-independent.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: docker
    container:
      image: golang:1.26
      options: "--init --tmpfs /tmp:exec,size=2g"
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs

      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-amd64-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-amd64-go-

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint (built against container Go)
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Coverage runs once on amd64 (coverage % is architecture- and race-independent)
  # and posts a "coverage" commit status whose description shows the percentage.
  # The job also fails when coverage drops below MIN_COVERAGE, so it gates merges.
  # ─────────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: docker
    container:
      image: golang:1.26
      options: "--init --tmpfs /tmp:exec,size=2g"
    steps:
      - name: Install Node.js (required by JS-based actions), curl and make
        run: apt-get update && apt-get install -y --no-install-recommends nodejs curl make

      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-amd64-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-amd64-go-

      - name: Download dependencies
        run: go mod download

      - name: Run coverage (replicates `make coverage`)
        # Delegate to the Makefile target so CI and local `make coverage` compute
        # coverage identically: go test -race -tags integration over the package
        # list excluding the example, internal/testutil, and gen packages, the
        # profile filtered the same way, then `go tool cover -func`. tee keeps the
        # output for the threshold step.
        run: make coverage 2>&1 | tee coverage.log

      - name: Report coverage and enforce threshold
        env:
          # ── Adjust the minimum coverage gate here ──
          MIN_COVERAGE: "84.0"
          TOKEN: ${{ github.token }}
          # Report against the PR head on pull_request so the status shows on the
          # PR; fall back to the pushed commit otherwise.
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          # The total line is the last line of `go tool cover -func` that
          # `make coverage` prints; take the percentage from its final column.
          pct=$(awk '/^total:/ {gsub(/%/,"",$NF); print $NF}' coverage.log)
          echo "Total coverage: ${pct}% (minimum ${MIN_COVERAGE}%)"
          echo "### Coverage: ${pct}% (minimum ${MIN_COVERAGE}%)" >> "$GITHUB_STEP_SUMMARY"

          # state=failure when pct < MIN_COVERAGE (awk handles the float compare).
          state=success
          if awk "BEGIN{exit !(${pct} < ${MIN_COVERAGE})}"; then
            state=failure
          fi

          # Post a commit status carrying the percentage in its description.
          api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -X POST "$api" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"state\":\"${state}\",\"context\":\"coverage\",\"description\":\"coverage: ${pct}% (min ${MIN_COVERAGE}%)\",\"target_url\":\"${run_url}\"}" \
            || echo "warning: failed to post coverage commit status (continuing)"

          if [ "${state}" = "failure" ]; then
            echo "::error::coverage ${pct}% is below the ${MIN_COVERAGE}% minimum"
            exit 1
          fi
