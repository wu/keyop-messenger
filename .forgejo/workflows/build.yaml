name: Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: docker
    container:
      image: golang:1.25
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

  test:
    name: Test
    runs-on: docker
    container:
      image: golang:1.25
    needs: build
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Unit tests
        run: go test -race ./...

      - name: Integration tests
        # -v streams per-test progress so the runner UI doesn't appear stalled
        # while the large root package runs. Longer timeout than the Makefile's
        # 60s default: container filesystem is slower (overlayfs + fsync-heavy
        # throughput tests need more headroom).
        run: go test -race -v -tags integration -timeout 5m ./...

  lint:
    name: Lint
    runs-on: docker
    container:
      image: golang:1.25
    steps:
      - name: Install Node.js (required by JS-based actions)
        run: apt-get update && apt-get install -y --no-install-recommends nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint (built against container Go)
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2

      - name: Run golangci-lint
        run: golangci-lint run ./...
