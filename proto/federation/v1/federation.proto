syntax = "proto3";
package federation.v1;
option go_package = "github.com/wu/keyop-messenger/gen/federation/v1;federationv1";

service FederationService {
  // Publish: client streams envelope batches to hub; hub streams acks back.
  // Client identity is passed via the "x-federation-instance" metadata key.
  rpc Publish(stream PublishBatch) returns (stream PublishAck);

  // Subscribe: client sends subscription handshake then acks;
  // hub streams envelope batches (and optionally a close notice).
  rpc Subscribe(stream SubscribeFrame) returns (stream HubBatch);
}

// Publish stream: client → hub
message PublishBatch {
  repeated bytes records = 1; // envelope.Marshal format — unchanged from disk format
}

// Publish stream: hub → client
message PublishAck {
  string last_id = 1;
}

// Subscribe stream: client → hub
// First message MUST be a SubscribeRequest; subsequent messages are Acks.
message SubscribeFrame {
  oneof payload {
    SubscribeRequest request = 1;
    Ack              ack     = 2;
  }
}

// Subscribe stream: hub → client
message HubBatch {
  oneof payload {
    EnvelopeBatch batch = 1;
    CloseNotice   close = 2;
  }
}

message SubscribeRequest {
  string          instance_name = 1;
  string          version       = 2;
  repeated string subscribe     = 3; // channels to receive from hub
  bool            ephemeral     = 4; // no replay on reconnect
}

message EnvelopeBatch {
  repeated bytes records = 1;
}

message Ack {
  string last_id = 1;
}

message CloseNotice {
  uint32 code = 1;
  string text = 2;
}
